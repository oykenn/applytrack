<div class="page-layout">
  <aside class="sidebar">
    <div class="logo">
      <h2>ApplyTrack</h2>
      <p>Student Job Tracker</p>
    </div>

    <nav>
      <a routerLink="/dashboard">Dashboard</a>
      <a routerLink="/applications" class="active">Applications</a>
      <a routerLink="/applications/add">Add Application</a>
    </nav>

    <button class="logout-btn" (click)="logout()">Logout</button>
  </aside>

  <main class="main-content">
    <section class="topbar">
      <div>
        <h1>Edit Application</h1>
        <p>Update your application details and status.</p>
      </div>

      <a [routerLink]="['/applications', applicationId]" class="back-btn">
        ← Back to Details
      </a>
    </section>

    <section class="form-card" *ngIf="isLoading">
      <p>Loading application...</p>
    </section>

    <section class="form-card" *ngIf="!isLoading">
      <form (ngSubmit)="updateApplication()" class="application-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Company Name *</label>
            <input
              type="text"
              name="company_name"
              [(ngModel)]="formData.company_name"
            />
          </div>

          <div class="form-group">
            <label>Position *</label>
            <input
              type="text"
              name="position"
              [(ngModel)]="formData.position"
            />
          </div>

          <div class="form-group">
            <label>Application Type</label>
            <select name="application_type" [(ngModel)]="formData.application_type">
              <option>Internship</option>
              <option>OJT</option>
              <option>Full-time</option>
              <option>Part-time</option>
              <option>Freelance</option>
            </select>
          </div>

          <div class="form-group">
            <label>Work Setup</label>
            <select name="work_setup" [(ngModel)]="formData.work_setup">
              <option>Remote</option>
              <option>Hybrid</option>
              <option>On-site</option>
            </select>
          </div>

          <div class="form-group">
            <label>Status</label>
            <select name="status" [(ngModel)]="formData.status">
              <option>Pending</option>
              <option>Interview</option>
              <option>Accepted</option>
              <option>Rejected</option>
            </select>
          </div>

          <div class="form-group">
            <label>Date Applied</label>
            <input
              type="date"
              name="date_applied"
              [(ngModel)]="formData.date_applied"
            />
          </div>

          <div class="form-group">
            <label>Location</label>
            <input
              type="text"
              name="location"
              [(ngModel)]="formData.location"
            />
          </div>

          <div class="form-group">
            <label>Job Link</label>
            <input
              type="url"
              name="job_link"
              [(ngModel)]="formData.job_link"
            />
          </div>

          <div class="form-group">
            <label>Contact Person</label>
            <input
              type="text"
              name="contact_person"
              [(ngModel)]="formData.contact_person"
            />
          </div>

          <div class="form-group">
            <label>Contact Email</label>
            <input
              type="email"
              name="contact_email"
              [(ngModel)]="formData.contact_email"
            />
          </div>

          <div class="form-group">
            <label>Interview Date</label>
            <input
              type="date"
              name="interview_date"
              [(ngModel)]="formData.interview_date"
            />
          </div>

          <div class="form-group">
            <label>Interview Time</label>
            <input
              type="time"
              name="interview_time"
              [(ngModel)]="formData.interview_time"
            />
          </div>

          <div class="form-group">
            <label>Interview Mode</label>
            <select name="interview_mode" [(ngModel)]="formData.interview_mode">
              <option value="">Not set</option>
              <option>Google Meet</option>
              <option>Zoom</option>
              <option>Phone Call</option>
              <option>On-site</option>
            </select>
          </div>

          <div class="form-group">
            <label>Meeting Link</label>
            <input
              type="url"
              name="meeting_link"
              [(ngModel)]="formData.meeting_link"
            />
          </div>
        </div>

        <div class="form-group full-width">
          <label>Notes</label>
          <textarea
            name="notes"
            [(ngModel)]="formData.notes"
            rows="5"
          ></textarea>
        </div>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <div class="form-actions">
          <a [routerLink]="['/applications', applicationId]" class="cancel-btn">
            Cancel
          </a>

          <button type="submit" [disabled]="isSaving">
            {{ isSaving ? 'Saving Changes...' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </section>
  </main>
</div>
